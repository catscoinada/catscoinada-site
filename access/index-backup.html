<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CATS Access</title>

  <style>
    body {
      background: #0b0b0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #cccccc;
      font-size: 18px;
    }

    .card {
      max-width: 500px;
      margin: auto;
      background: #15151d;
      padding: 30px;
      border-radius: 20px;
      margin-top: 30px;
      box-shadow: 0 0 20px rgba(128, 0, 255, 0.3);
    }

    button {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 20px;
      font-size: 16px;
      color: #00ff99;
    }

    #content {
      display: none;
      margin-top: 30px;
      padding: 20px;
      background: #1f1f2a;
      border-radius: 15px;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <h1>🐱 CATS Access</h1>

  <p>
    Connect your Eternl Wallet to enter the CATS Universe.
  </p>

  <div class="card">

    <button onclick="connectWallet()">
      Connect Eternl Wallet
    </button>

    <p id="status">
      Wallet not connected.
    </p>

    <div id="content">

      <h2>Welcome to CATS Universe</h2>

      <p>
        Your wallet has entered the Access Zone.
      </p>

      <img src="https://catscoinada.com/logo.png" alt="CATS Logo">

    </div>

  </div>

<script>

let walletApi = null;

async function connectWallet() {

  try {

    if (!window.cardano || !window.cardano.eternl) {

      alert(
        "Eternl wallet not detected. Please open inside Eternl DApp Browser."
      );

      return;
    }

    walletApi = await window.cardano.eternl.enable();

    document.getElementById("status").innerText =
      "Wallet connected successfully.";

    document.getElementById("content").style.display = "block";

  } catch (error) {

    console.error(error);

    document.getElementById("status").innerText =
      "Wallet connection failed or rejected.";
  }
}

</script>

</body>
</html>
