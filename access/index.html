<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CATS Access</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #25133f, #050507 70%);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .box {
      max-width: 560px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 0 40px rgba(180,80,255,0.25);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #d7c9ef;
      line-height: 1.6;
    }

    button {
      margin-top: 20px;
      padding: 16px 28px;
      border: none;
      border-radius: 999px;
      background: #b86cff;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #d08cff;
    }

    #status {
      margin-top: 24px;
      font-size: 18px;
      color: #ffd86b;
      word-break: break-word;
    }

    #accessContent {
      display: none;
      margin-top: 30px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(120,255,170,0.12);
      border: 1px solid rgba(120,255,170,0.35);
    }

    .locked {
      color: #ff8c8c;
    }

    .unlocked {
      color: #8cffb0;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🐱 CATS Access</h1>

    <p>
      Connect your Cardano wallet.<br />
      Hold CATS. Unlock the universe.
    </p>

    <button onclick="connectWallet()">Connect Eternl Wallet</button>

    <div id="status">Wallet not connected.</div>

    <div id="accessContent">
      <h2 class="unlocked">Access Unlocked 🔓</h2>
      <p>
        Welcome to CATS Access.<br />
        This is the beginning of the CATS Universe.
      </p>
    </div>
  </div>

  <script>
    const CATS_POLICY_ID =
      "bbb0be3f57598bbf6a7d6ce18a60700beceb6904923a6a555ca03454";

    const MIN_CATS_AMOUNT = 1; 
    // 테스트용: CATS 1개 이상이면 입장 가능
    // 나중에 8 ADA 가치 기준으로 바꿀 수 있음

    async function connectWallet() {
      const status = document.getElementById("status");
      const accessContent = document.getElementById("accessContent");

      try {
        status.innerHTML = "Checking wallet...";

        if (!window.cardano) {
          status.innerHTML =
            "<span class='locked'>No Cardano wallet detected. Please install Eternl.</span>";
          return;
        }

        if (!window.cardano.eternl) {
          status.innerHTML =
            "<span class='locked'>Eternl wallet not found. Please enable Eternl extension.</span>";
          return;
        }

        const walletApi = await window.cardano.eternl.enable();

        status.innerHTML = "Wallet connected. Checking CATS balance...";

        const balanceHex = await walletApi.getBalance();

        const hasCats = balanceHex.includes(CATS_POLICY_ID);

        if (hasCats) {
          status.innerHTML =
            "<span class='unlocked'>CATS detected. Access granted 🔓</span>";
          accessContent.style.display = "block";
        } else {
          status.innerHTML =
            "<span class='locked'>No CATS detected. Access locked 🔒</span>";
          accessContent.style.display = "none";
        }
      } catch (error) {
        console.error(error);
        status.innerHTML =
          "<span class='locked'>Wallet connection failed. Please try again.</span>";
      }
    }
  </script>
</body>
</html>
