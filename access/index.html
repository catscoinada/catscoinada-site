<script>
let api = null;

async function connectWallet() {
  try {
    if (!window.cardano) {
      alert("No Cardano wallet found");
      return;
    }

    const walletName = Object.keys(window.cardano)[0];

    if (!walletName) {
      alert("No wallet detected");
      return;
    }

    api = await window.cardano[walletName].enable();

    document.getElementById("status").innerText = "Wallet Connected: " + walletName;

    checkCATS();

  } catch (err) {
    console.error(err);
  }
}
</script>
