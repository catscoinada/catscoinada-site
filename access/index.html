<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CATS Access</title>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

  <h1>🐱 CATS Access</h1>

  <button onclick="connectWallet()">Connect Wallet</button>

  <p id="status">Not connected</p>

  <div id="content" style="display:none; margin-top:30px;">
    <h2>🎉 Welcome CATS Holder</h2>
    <p>This is your unlocked content.</p>
  </div>

  <script>
    let api = null;

    async function connectWallet() {
      try {
        console.log("Step 1: Checking wallet...");

        if (!window.cardano) {
          alert("❌ No Cardano wallet detected");
          return;
        }

        console.log("Step 2: Cardano found");

        if (!window.cardano.eternl) {
          alert("❌ Eternl wallet not installed");
          return;
        }

        console.log("Step 3: Eternl detected");

        api = await window.cardano.eternl.enable();

        console.log("Step 4: Connected", api);

        document.getElementById("status").innerText =
          "✅ Wallet Connected: Eternl";

        document.getElementById("content").style.display = "block";

      } catch (err) {
        console.error("ERROR:", err);
        alert("❌ Connection failed: " + err.message);
      }
    }
  </script>

</body>
</html>
